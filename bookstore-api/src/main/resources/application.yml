spring:
  datasource:
    url: jdbc:h2:mem:bookstoredb
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  jackson:
    default-property-inclusion: non_null

app:
  jwt:
    secret: ${JWT_SECRET:VGhpc0lzQVN0cm9uZ0RlbW9TZWNyZXRLZXlGb3JCb29rc3RvcmVBcGlKd3QxMjM0NTY3ODkw}
    expiration: 86400000

server:
  port: 8080
  servlet:
    context-path: /api/v1
